  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: resonate-orchestrator
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

aws:
  region: ${AWS_REGION}
  s3:
    bucket: ${S3_BUCKET_NAME}

services:
  rust:
    base-url: http://rust-service:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
