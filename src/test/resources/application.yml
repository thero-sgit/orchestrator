spring:
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: noop
        secret-key: noop

  datasource:
    url: jdbc:postgresql://postgres:5432/testPostgres
    username: testUsername
    password: testPassword
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    generate-ddl: true

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: resonate-orchestrator
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

services:
  rust:
    base-url: http://rust-service:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
